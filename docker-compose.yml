version: "3.9"

services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 adhyeta.asgi:application
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=adhyeta.settings.dev
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adhyeta_db
      POSTGRES_USER: adhyeta_user
      POSTGRES_PASSWORD: adhyeta_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  media_data:
