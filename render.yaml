services:
  - type: web
    name: adhyeta-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements/prod.txt && python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT adhyeta.asgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: adhyeta.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
